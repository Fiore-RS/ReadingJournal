name: Keep Render backend alive

on:
  schedule:
    # Every 10 minutes — comfortably under Render's 15-minute inactivity
    # spin-down window, with margin for GitHub's scheduling delays.
    - cron: "*/10 * * * *"
  # Lets you trigger a run manually from the Actions tab to test it.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sf -o /dev/null -w "Status: %{http_code}\n" \
            https://reading-journal-backend-cc35.onrender.com/api/health
